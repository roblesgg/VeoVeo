name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Patch ALL node_modules Kotlin versions
        run: |
          # Replace all ${kotlinVersion} in expo node_modules to 2.0.21
          find node_modules/expo* -name "build.gradle" -exec sed -i 's/\${kotlinVersion}/2.0.21/g' {} +
          find node_modules/expo* -name "*.gradle" -exec sed -i 's/\${kotlinVersion}/2.0.21/g' {} +
          # Replace async-storage default
          sed -i 's/DEFAULT_KOTLIN_VERSION = "1.9.24"/DEFAULT_KOTLIN_VERSION = "2.0.21"/' node_modules/@react-native-async-storage/async-storage/android/config.gradle
          # Force expo-updates KSP
          sed -i 's/def kotlinVersion = rootProject\["kotlinVersion"\]/def kotlinVersion = "2.0.21"/' node_modules/expo-updates/android/build.gradle

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Fix Gradle files for Kotlin 2.0.21
        run: |
          # Force root build.gradle to use kotlin 2.0.21 explicitly
          sed -i "s/classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')/classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21')/" android/build.gradle
          # Force gradle.properties kotlinVersion
          echo "" >> android/gradle.properties
          echo "kotlinVersion=2.0.21" >> android/gradle.properties
          echo "android.kotlinVersion=2.0.21" >> android/gradle.properties
          cat android/gradle.properties | grep -E "^kotlin|^android.kotlin"

      - name: Fix enableBundleCompression (RN 0.76 compat)
        run: sed -i "s/enableBundleCompression = /\/\/ enableBundleCompression = /" android/app/build.gradle

      - name: Build APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
