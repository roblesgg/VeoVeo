name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android
        run: npx expo prebuild --platform android

      - name: Fix enableBundleCompression (RN 0.76 compat)
        run: sed -i "s/enableBundleCompression = /\/\/ enableBundleCompression = /" android/app/build.gradle

      - name: Fix Kotlin version for async-storage
        run: |
          echo "" >> android/gradle.properties
          echo "kotlinVersion=2.0.21" >> android/gradle.properties
          cat android/gradle.properties | grep -E "^kotlin|^android.kotlin"

      - name: Build APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
