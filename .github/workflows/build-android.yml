name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Patch node_modules Kotlin versions
        run: |
          # Force async-storage to use 2.0.21 instead of 1.9.24 default
          sed -i 's/DEFAULT_KOTLIN_VERSION = "1.9.24"/DEFAULT_KOTLIN_VERSION = "2.0.21"/' node_modules/@react-native-async-storage/async-storage/android/config.gradle
          # Force expo-updates KSP to use 2.0.21
          sed -i 's/def kotlinVersion = rootProject\["kotlinVersion"\]/def kotlinVersion = "2.0.21"/' node_modules/expo-updates/android/build.gradle
          # Force expo-dev-launcher compose plugin to 2.0.21
          sed -i 's/\${kotlinVersion}/2.0.21/g' node_modules/expo-dev-launcher/android/build.gradle

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Fix enableBundleCompression (RN 0.76 compat)
        run: sed -i "s/enableBundleCompression = /\/\/ enableBundleCompression = /" android/app/build.gradle

      - name: Build APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
